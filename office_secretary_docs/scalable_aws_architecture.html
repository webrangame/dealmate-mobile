# Scalable AWS SaaS Architecture - AI Office Secretary

## 1. Technology Stack Recommendation

### Frontend: **Next.js (React)**
*   **Why**: Best-in-class for SaaS. Excellent SEO, Server-Side Rendering (SSR) for performance, and integrates perfectly with AWS Amplify or Vercel.
*   **Hosting**: AWS Amplify (simplest) or Dockerized on AWS ECS (for more control).

### Backend: **Python (FastAPI)**
*   **Answer to "Python vs. Go"**:
    *   **Recommendation**: **Python**.
    *   **Reasoning**: This is an *Agentic AI* system. The best orchestration libraries (LangGraph, LangChain, CrewAI) are native to Python. Using Go would require building a complex bridge to Python services anyway.
    *   **Performance**: FastAPI is asynchronous and highly performant. For "Large Scale," we rely on **Horizontal Scaling** (adding more containers) rather than raw language speed.

### Database: **AWS Aurora PostgreSQL (Serverless v2)**
*   **Why**: Fully managed, auto-scaling. It handles the "Large Scale" requirement automatically by adding compute/memory as load increases.
*   **Vector Search**: Enable `pgvector` directly on Aurora.

### Infrastructure: **AWS ECS (Fargate)**
*   **Why**: Serverless containers. No need to manage EC2 instances. Secure, scalable, and compliant.

## 2. Microservices Definition (Do you need them?)

**Recommendation: The "Hybrid" Approach**

*   **No, don't build full Microservices for the API**.
    *   *Why?* Splitting "Auth Service", "User Service", and "Billing Service" into tiny pieces creates "Distributed Hell" (latency, impossible debugging) for a startup.
    *   *Approach*: Build a **Modular Monolith** for the Core API. It's one deployable unit, but code is organized nicely.

*   **Yes, DO use Microservices for the Agents**.
    *   *Why?* The "Event Coordinator" might need 4GB RAM to process venues, while the "Scheduler" needs only 512MB.
    *   *Approach*: Deploy each Agent Skill (Event, HR, Comms) as a **separate Worker Service** in ECS.
    *   *Result*: You can scale the "Event Agent" to 100 containers during the holiday season without paying for 100 "Scheduler" containers.

## 4. Key Scalability & Performance Strategies

### A. Asynchronous "Event-Driven" Core
*   **Problem**: multi-step agents are slow (10s - 2mins).
*   **Solution**: Do **NOT** keep the user waiting on the HTTP request.
    *   User Request -> API -> **Push to SQS Queue** -> Return "202 Accepted".
    *   **Worker Containers** pick up the task, run the AI logic, and update the DB.
    *   **Frontend**: Polls or uses WebSockets to show the result when ready.

### B. Database Scaling
*   **Read Replicas**: All "view" operations (viewing dashboard, logs) hit the **Read Replica**, freeing up the **Primary** for Agent writes.
*   **Aurora Serverless**: As your SaaS grows from 100 to 100,000 users, Aurora automatically adds CPU/RAM.

### C. Caching
*   **ElastiCache (Redis)**: Store user sessions and *frequently accessed agent context* (e.g., "What is the user's timezone?") to avoid hitting the DB every time.

## 5. Data Security (Enterprise Grade)

1.  **Encryption at Rest**:
    *   All databases (Aurora, Redis) encrypted using **AWS KMS**.
    *   Sensitive Tokens (Gmail OAuth keys) stored in **AWS Secrets Manager**, never in the DB in plain text.

2.  **Encryption in Transit**:
    *   TLS 1.2+ for all internal communication.

3.  **Network Isolation**:
    *   **Private Subnets**: The Database and Agent Workers have **NO public IP**. They can only be reached via the Load Balancer or NAT Gateway.
